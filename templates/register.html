<!DOCTYPE html>
<html>
<head>
    <title>Créer un compte</title>
    <style>
        body {
            background: #34495e;
            font-family: Arial;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2980b9;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Créer un compte</h2>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/register">
        <input type="text" name="username" placeholder="Nom utilisateur">
        <input type="password" name="password" placeholder="Mot de passe">
        <button type="submit">Créer compte</button>
    </form>

    <p><a href="/login">Se connecter</a></p>
</div>

</body>
</html>
