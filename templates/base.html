<!DOCTYPE html>
<html>
<head>
    <title>Gestion App</title>
    <style>
        body {
            font-family: Arial;
            background: #ecf0f1;
            margin: 0;
        }

        .navbar {
            background: #2c3e50;
            padding: 15px;
        }

        .navbar a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .container {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 10px;
        }

        button {
            padding: 10px;
            border: none;
            background: #27ae60;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/dashboard">Dashboard</a>
    <a href="/produits">Produits</a>
    <a href="/factures">Factures</a>
    <a href="/abonnement">Abonnement</a>
    <a href="/analyse_ia">IA</a>
    <a href="/logout">Déconnexion</a>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
