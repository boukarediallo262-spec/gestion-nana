{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<div class="cards">
    <div class="card">
        <h3>Ventes</h3>
        <p>{{ ventes }} FCFA</p>
    </div>

    <div class="card">
        <h3>Dépenses</h3>
        <p>{{ depenses }} FCFA</p>
    </div>

    <div class="card">
        <h3>Bénéfice</h3>
        <p>{{ benefice }} FCFA</p>
    </div>

    <div class="card">
        <h3>Produits</h3>
        <p>{{ total_produits }}</p>
    </div>
</div>

<canvas id="chart" height="100"></canvas>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ labels|safe }},
        datasets: [
            {
                label: 'Ventes',
                data: {{ ventes_data|safe }},
                borderWidth: 2
            },
            {
                label: 'Dépenses',
                data: {{ depenses_data|safe }},
                borderWidth: 2
            }
        ]
    }
});
</script>

{% endblock %}
