<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FASO GESTION IA</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
}
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 16px;
}
</style>
</head>

<body class="p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">🇧🇫 FASO GESTION IA</h1>
    <a href="/logout" class="text-red-400">Déconnexion</a>
</div>

<!-- STATS -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<div class="glass p-4">
<h2>Ventes</h2>
<p class="text-2xl text-green-400">{{ ventes }} FCFA</p>
</div>

<div class="glass p-4">
<h2>Dépenses</h2>
<p class="text-2xl text-red-400">{{ depenses }} FCFA</p>
</div>

<div class="glass p-4">
<h2>Bénéfice</h2>
<p class="text-2xl text-blue-400">{{ benefice }} FCFA</p>
</div>

</div>

<!-- CHART -->
<div class="glass mt-6 p-4">
<canvas id="chart"></canvas>
</div>

<!-- IA PANEL -->
<div class="glass mt-6 p-4">
<h2 class="mb-2">🤖 Assistant IA Comptable</h2>

<button onclick="askAI()" class="bg-blue-500 px-4 py-2 rounded">
Analyser mes finances
</button>

<p id="ia" class="mt-3 text-sm text-gray-300"></p>
</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
type: 'bar',
data: {
labels: {{ labels|safe }},
datasets: [{
label: 'Finance',
data: {{ data|safe }},
backgroundColor: ['#22c55e','#ef4444','#3b82f6']
}]
}
});

function askAI(){
fetch('/ia', {
method: 'POST'
})
.then(res => res.json())
.then(data => {
document.getElementById('ia').innerText = data.response;
});
}
</script>

<!-- CHAT IA FLOATING PANEL -->
<div class="fixed bottom-4 right-4 w-80 glass p-3 shadow-xl">

    <h3 class="text-sm font-bold mb-2">🤖 IA Comptable</h3>

    <div id="chatBox" class="h-40 overflow-y-auto text-xs mb-2"></div>

    <input id="msg" class="w-full p-2 rounded text-black" placeholder="Pose une question...">

    <button onclick="sendMsg()" class="mt-2 bg-green-500 w-full py-1 rounded">
        Envoyer
    </button>
</div>

<script>
function addMsg(text, from){
    const box = document.getElementById("chatBox");
    box.innerHTML += `<p class="${from=='user'?'text-blue-300':'text-green-300'}">${text}</p>`;
    box.scrollTop = box.scrollHeight;
}

function sendMsg(){
    let input = document.getElementById("msg");
    let message = input.value;

    if(!message) return;

    addMsg(message,'user');

    fetch("/chat_ia", {
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message})
    })
    .then(res => res.json())
    .then(data => {
        addMsg(data.response,'ia');
    });

    input.value = "";
}
</script><!-- CHAT IA FLOATING PANEL -->

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
