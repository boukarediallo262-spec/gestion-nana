<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
    <style>
        body {
            background: #2c3e50;
            font-family: Arial;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Connexion</h2>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}
<form method="POST" action="/login">
    <input type="text" name="username">
    <input type="password" name="password">
    <button type="submit">Se connecter</button>
</form>
    

    <p><a href="/register">Créer un compte</a></p>
</div>

</body>
</html>
