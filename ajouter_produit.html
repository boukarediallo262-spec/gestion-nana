{% extends "base.html" %}
{% block content %}

<h2>Ajouter un produit</h2>

<form method="POST">

    Nom : <input type="text" name="nom" required><br><br>

    Quantité : <input type="number" name="quantite" required><br><br>

    Prix d'achat : <input type="number" step="0.01" name="prix_achat" required><br><br>

    Prix de vente : <input type="number" step="0.01" name="prix_vente" required><br><br>

    <button type="submit">Ajouter</button>

</form>

<br>
<a href="/produits">⬅ Retour</a>

{% endblock %}
