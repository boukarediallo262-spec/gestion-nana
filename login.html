{% extends "base.html" %}
{% block content %}
<h2>Connexion</h2>
<form method="POST">
    Username: <input name="username" required><br><br>
    Password: <input type="password" name="password" required><br><br>
    <button>Se connecter</button>
</form>
<br>
{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}
<a href="/register">Créer un compte</a>
{% endblock %}
